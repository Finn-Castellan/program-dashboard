name: Deploy to Hostinger

on:
  push:
    branches:
      - main   # change to "master" if that's your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Hostinger's public_html path — adjust if you deployed into a subfolder:
          server-dir: /public_html/programdashboard/
          # Exclude files that only belong on the local XAMPP copy
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
