name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "u895763689,$FTP_PASS" ftp://45.84.206.23 << 'ENDFTP'
          set ftp:ssl-allow no
          set net:timeout 60
          set net:max-retries 3
          mirror --reverse --delete --no-perms --exclude-glob .git* --exclude README.md . /public_html/programdashboard/
          quit
          ENDFTP
