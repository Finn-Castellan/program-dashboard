name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp << ENDFTP
          set ftp:ssl-allow no
          set net:timeout 60
          set net:max-retries 3
          open -u "u895763689.programdashboard,$FTP_PASS" 45.84.206.23
          mirror --reverse --no-perms --transfer-all --exclude '\.git' --exclude '\.gitignore' --exclude 'README\.md' . /public_html/program-dashboard/
          quit
          ENDFTP
