name: Deploy to Hostinger

on:
  push:
    branches:
      - main   # change to "master" if that's your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   45.84.206.23
          username: u895763689
          password: ${{ secrets.FTP_PASSWORD }}
          port:     21
          # Files live at public_html/programdashboard/ on Hostinger:
          server-dir: /public_html/programdashboard/
          # Exclude files that only belong on the local XAMPP copy
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md
