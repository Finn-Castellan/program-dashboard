<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MIIC Admin — Data Entry</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0f172a;
    --surface:  #1e293b;
    --border:   #334155;
    --accent:   #3b82f6;
    --text:     #e2e8f0;
    --muted:    #94a3b8;
    --success:  #10b981;
    --warning:  #f59e0b;
    --danger:   #ef4444;
    --radius:   10px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* ── Layout ── */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; gap: 14px; }
  header h1 { font-size: 16px; font-weight: 700; }
  header span { color: var(--muted); font-size: 13px; }
  a.back { font-size: 13px; color: var(--accent); text-decoration: none; }
  a.back:hover { text-decoration: underline; }

  main { max-width: 860px; margin: 32px auto; padding: 0 20px 60px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab { padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .15s, border-color .15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 20px; }
  .card h2 { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }

  /* ── Form ── */
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .full { grid-column: 1 / -1; }
  label { display: block; font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 5px; letter-spacing: .03em; }
  input, select, textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 11px; color: var(--text); font-size: 13px;
    transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 72px; }
  select option { background: var(--surface); }

  .range-wrap { display: flex; align-items: center; gap: 10px; }
  .range-wrap input[type=range] { flex: 1; accent-color: var(--accent); background: transparent; border: none; padding: 4px 0; }
  .range-wrap span { width: 36px; text-align: right; font-weight: 700; color: var(--accent); font-size: 13px; }

  /* ── Buttons ── */
  .btn { padding: 8px 18px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-success { background: var(--success); color: #fff; }
  .btn-danger  { background: var(--danger);  color: #fff; }
  .btn-warning { background: var(--warning); color: #000; }
  .btn-sm { padding: 5px 11px; font-size: 12px; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 28px; right: 28px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
  .toast-msg { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--success); border-radius: 8px; padding: 11px 16px; font-size: 13px; box-shadow: 0 4px 16px #0006; animation: slideIn .25s ease; }
  .toast-msg.err  { border-left-color: var(--danger); }
  .toast-msg.warn { border-left-color: var(--warning); }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }

  /* ── Alert list ── */
  .alert-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .alert-row:last-child { border-bottom: none; }
  .alert-icon { font-size: 20px; flex-shrink: 0; }
  .alert-body { flex: 1; min-width: 0; }
  .alert-title { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
  .alert-desc  { font-size: 12px; color: var(--muted); }
  .alert-meta  { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .badge-overdue  { background: #7f1d1d33; color: #fca5a5; }
  .badge-deadline { background: #78350f33; color: #fcd34d; }
  .badge-info     { background: #1e3a5f33; color: #93c5fd; }

  /* ── KPI Grid ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .kpi-item label { font-size: 11px; }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 32px; color: var(--muted); font-size: 13px; }

  /* ── Activities table ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: var(--muted); font-size: 11px; font-weight: 700; letter-spacing: .05em; border-bottom: 1px solid var(--border); }
  td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .status-pill { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .status-on-track { background: #052e1633; color: #6ee7b7; }
  .status-caution  { background: #451a0333; color: #fcd34d; }
  .status-behind   { background: #450a0a33; color: #fca5a5; }

  /* ── Role selector (header) ── */
  .role-select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 12px; font-weight: 600; padding: 5px 10px; cursor: pointer; transition: border-color .15s; }
  .role-select:focus { outline: none; border-color: var(--accent); }
  .role-select option { background: var(--surface); }
  .role-hidden { display: none !important; }

  /* ── Field Staff: Program Overview cards ── */
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .summary-prog-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; transition: border-color .15s; }
  .summary-prog-card:hover { border-color: var(--accent); }
  .summary-prog-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .summary-prog-icon  { font-size: 20px; }
  .summary-prog-name  { font-size: 13px; font-weight: 700; }
  .summary-prog-stage { font-size: 11px; color: var(--muted); }
  .summary-status { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 12px; font-size: 11px; font-weight: 700; margin-bottom: 8px; }
  .summary-status.on-track { background: rgba(16,185,129,0.15); color: #6ee7b7; }
  .summary-status.caution  { background: rgba(245,158,11,0.15);  color: #fcd34d; }
  .summary-status.behind   { background: rgba(239,68,68,0.15);   color: #fca5a5; }
  .summary-metrics-row { display: flex; gap: 16px; font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .summary-metrics-row strong { color: var(--text); display: block; font-size: 15px; font-weight: 800; }
  .summary-progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .summary-progress-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }

  @media(max-width:600px) { .grid, .grid.three { grid-template-columns: 1fr; } }

  /* ── Login overlay ── */
  #login-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  #login-overlay.hidden { display: none; }
  .login-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 36px 40px; width: 340px;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }
  .login-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .login-box p  { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
  .login-box input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); padding: 9px 12px;
    font-size: 14px; margin-bottom: 12px; transition: border-color .15s;
  }
  .login-box input:focus { outline: none; border-color: var(--accent); }
  .login-box .btn-login {
    width: 100%; padding: 10px; background: var(--accent); color: #fff;
    border: none; border-radius: 7px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity .15s;
  }
  .login-box .btn-login:hover { opacity: .85; }
  .login-box .btn-login:disabled { opacity: .5; cursor: default; }
  #login-error { font-size: 12px; color: var(--danger); min-height: 18px; margin-top: 8px; }
</style>
</head>
<body>

<!-- ── Login overlay ─────────────────────────────────────────── -->
<div id="login-overlay">
  <div class="login-box">
    <h2>&#x1F510; MIIC Admin</h2>
    <p>Sign in to access the data entry panel</p>
    <input type="text"     id="li-user" placeholder="Username"  autocomplete="username">
    <input type="password" id="li-pass" placeholder="Password"  autocomplete="current-password"
           onkeydown="if(event.key==='Enter') doLogin()">
    <button class="btn-login" id="li-btn" onclick="doLogin()">Sign In</button>
    <div id="login-error"></div>
  </div>
</div>

<header>
  <span style="font-size:22px">⚙️</span>
  <div>
    <h1>MIIC Admin — Data Entry</h1>
    <span id="role-desc">Update program metrics, alerts, and activities</span>
  </div>
  <div style="margin-left:auto;display:flex;align-items:center;gap:14px">
    <label for="adminRole" style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em">VIEW AS</label>
    <select id="adminRole" class="role-select" onchange="applyRole(this.value)">
      <option value="manager">👑 Manager</option>
      <option value="field">📋 Field Staff</option>
    </select>
    <button class="btn btn-sm" id="logout-btn" onclick="doLogout()" style="display:none">&#x1F511; Sign Out</button>
    <a class="back" href="index.html">← Dashboard</a>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab active" data-role="manager" onclick="switchTab('programs')">&#x1F4CA; Program Metrics</button>
    <button class="tab" data-role="manager" onclick="switchTab('alerts')">&#x1F514; Alerts</button>
    <button class="tab" onclick="switchTab('activities')">&#x1F4CB; Activities</button>
    <button class="tab" data-role="field" onclick="switchTab('summary')">&#x1F5FA;&#xFE0F; Program Overview</button>
  </div>

  <!-- ══════════════════════════════════════════════ PROGRAMS ═══ -->
  <div id="panel-programs" class="panel active">

    <div class="card">
      <h2>📊 Select Program</h2>
      <div style="display:flex;gap:10px;align-items:center">
        <select id="prog-select" onchange="loadProgram()" style="max-width:320px">
          <option value="">Loading programs…</option>
        </select>
        <span id="prog-status-badge" style="font-size:12px"></span>
      </div>
    </div>

    <div id="prog-form" style="display:none">
      <div class="card">
        <h2>📈 Metrics</h2>
        <div class="grid three">
          <div>
            <label>STATUS</label>
            <select id="f-status">
              <option value="on-track">✅ On Track</option>
              <option value="caution">⚠️ Caution</option>
              <option value="behind">🔴 Behind</option>
            </select>
          </div>
          <div>
            <label>BUDGET USED (%)</label>
            <div class="range-wrap">
              <input type="range" id="f-budget" min="0" max="100" oninput="$('f-budget-val').textContent=this.value+'%'">
              <span id="f-budget-val">0%</span>
            </div>
          </div>
          <div>
            <label>COMPLETION (%) <span style="font-size:10px;color:var(--success);font-weight:400;text-transform:none;letter-spacing:0">auto-computed from KPIs</span></label>
            <div style="display:flex;align-items:center;gap:10px;padding:8px 0">
              <div style="flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden">
                <div id="f-completion-bar" style="height:100%;width:0%;background:var(--accent);border-radius:4px;transition:width .3s"></div>
              </div>
              <span id="f-completion-val" style="width:36px;text-align:right;font-weight:700;color:var(--accent);font-size:13px">0%</span>
            </div>
          </div>
          <div>
            <label>TODAY'S ACTIVITIES</label>
            <input type="number" id="f-today" min="0" max="9999">
          </div>
          <div>
            <label>TOTAL ACTIVITIES</label>
            <input type="number" id="f-total" min="0">
          </div>
        </div>
      </div>

      <div class="card">
        <h2>🎯 KPIs</h2>
        <div id="kpi-grid" class="kpi-grid"></div>
      </div>

      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn btn-primary" onclick="saveProgram()">💾 Save Changes</button>
        <button class="btn btn-warning" onclick="resetToday()">🔄 Reset Today's Count to 0</button>
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════ ALERTS ═════ -->
  <div id="panel-alerts" class="panel">

    <div class="card">
      <h2>➕ Create New Alert</h2>
      <div class="grid">
        <div>
          <label>TYPE</label>
          <select id="a-type">
            <option value="overdue">🔴 Overdue</option>
            <option value="deadline">⚠️ Deadline</option>
            <option value="info">ℹ️ Info</option>
          </select>
        </div>
        <div>
          <label>LINKED PROGRAM (optional)</label>
          <select id="a-prog">
            <option value="">— None —</option>
          </select>
        </div>
        <div class="full">
          <label>TITLE</label>
          <input type="text" id="a-title" placeholder="e.g. Gate Review overdue for cohort 3">
        </div>
        <div class="full">
          <label>DESCRIPTION</label>
          <textarea id="a-desc" placeholder="Additional context…"></textarea>
        </div>
        <div>
          <label>TAG (short label)</label>
          <input type="text" id="a-tag" placeholder="e.g. GIP • Gate Review" maxlength="60">
        </div>
        <div>
          <label>TIME LABEL</label>
          <input type="text" id="a-time" value="Just now" maxlength="40">
        </div>
        <div>
          <label>ICON (emoji)</label>
          <input type="text" id="a-icon" value="🔔" maxlength="4" style="max-width:80px">
        </div>
      </div>
      <button class="btn btn-success" style="margin-top:14px" onclick="createAlert()">Create Alert</button>
    </div>

    <div class="card">
      <h2>🔔 Active Alerts <span id="alert-count" style="font-weight:400;color:var(--muted);font-size:12px"></span></h2>
      <div id="alert-list"><div class="empty">Loading…</div></div>
      <div style="margin-top:14px">
        <button class="btn btn-danger btn-sm" onclick="acknowledgeAll()">Acknowledge All</button>
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════ ACTIVITIES ══ -->
  <div id="panel-activities" class="panel">

    <div class="card">
      <h2>📋 Log New Activity</h2>
      <div class="grid">
        <div>
          <label>PROGRAM</label>
          <select id="act-prog"></select>
        </div>
        <div>
          <label>ACTIVITY TYPE</label>
          <select id="act-type">
            <option>Workshops</option><option>Coaching</option><option>Gate Reviews</option>
            <option>Testing</option><option>Advisory</option><option>Demo Days</option>
            <option>Investor Eng.</option><option>Pilots</option>
          </select>
        </div>
        <div class="full">
          <label>ACTIVITY NAME</label>
          <select id="act-name-sel" onchange="handleActNameSel()">
            <option value="">— Select existing name —</option>
            <option value="__custom__">✏️ Custom…</option>
          </select>
          <input type="text" id="act-name" placeholder="Enter activity name…" style="display:none;margin-top:6px">
        </div>
        <div>
          <label>DATE</label>
          <input type="date" id="act-date">
        </div>
        <div>
          <label>STATUS</label>
          <select id="act-status">
            <option value="on-track">✅ On Track</option>
            <option value="caution">⚠️ Caution</option>
            <option value="behind">🔴 Behind</option>
          </select>
        </div>
        <div>
          <label>RESPONSIBLE PERSON</label>
          <select id="act-person-sel" onchange="handleActPersonSel()">
            <option value="">— Select person —</option>
            <option value="__custom__">✏️ Custom…</option>
          </select>
          <input type="text" id="act-person" placeholder="Enter name…" style="display:none;margin-top:6px">
        </div>
        <div class="full">
          <label>NOTES</label>
          <textarea id="act-notes" placeholder="Optional notes…"></textarea>
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top:14px" onclick="logActivity()">Log Activity</button>
    </div>

    <div class="card">
      <h2>📄 Recent Activities <span id="act-filter-label" style="font-weight:400;color:var(--muted);font-size:12px"></span></h2>
      <div style="display:flex;gap:10px;margin-bottom:14px;align-items:center">
        <select id="act-filter-prog" onchange="loadActivities()" style="max-width:220px">
          <option value="">All Programs</option>
        </select>
        <button class="btn btn-sm" style="background:var(--border);color:var(--text)" onclick="loadActivities()">Refresh</button>
      </div>
      <div id="act-table"><div class="empty">Loading…</div></div>
    </div>

  </div>
</main>

<div id="toast"></div>

<script>
const API = 'api';
const $ = id => document.getElementById(id);
let programs = [];
let kpiKeys  = {};   // progId → array of kpi key names

// ── Tab switching ─────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab,.panel').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  $(`panel-${name}`).classList.add('active');
}

// ── Toast notifications ───────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = 'toast-msg' + (type === 'err' ? ' err' : type === 'warn' ? ' warn' : '');
  el.textContent = msg;
  $('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Load programs on boot ─────────────────────────────────────
async function boot() {
  try {
    const res = await fetch(`${API}/programs.php`);
    programs  = await res.json();
  } catch (_) {
    toast('Cannot reach API — is XAMPP running?', 'err');
    return;
  }

  // Populate all program selects
  const opts = programs.map(p =>
    `<option value="${p.id}">${p.icon} ${p.abbr} — ${p.name}</option>`
  ).join('');

  $('prog-select').innerHTML = '<option value="">— Choose a program —</option>' + opts;

  const optsFull = programs.map(p =>
    `<option value="${p.id}">${p.abbr}</option>`
  ).join('');
  $('a-prog').innerHTML += optsFull;
  $('act-prog').innerHTML = optsFull;
  $('act-filter-prog').innerHTML = '<option value="">All Programs</option>' + optsFull;

  // Default date for activity log
  $('act-date').value = new Date().toISOString().slice(0, 10);

  loadAlerts();
  loadActivities();

  // Restore saved role or default to manager
  const savedRole = (() => { try { return sessionStorage.getItem('adminRole'); } catch (_) { return null; } })();
  const initRole  = (savedRole === 'field' || savedRole === 'manager') ? savedRole : 'manager';
  $('adminRole').value = initRole;
  applyRole(initRole);
}

// ── Program metrics ───────────────────────────────────────────
function loadProgram() {
  const id   = $('prog-select').value;
  const prog = programs.find(p => p.id === id);
  if (!prog) { $('prog-form').style.display = 'none'; return; }

  $('prog-form').style.display = 'block';

  // Status
  $('f-status').value = prog.status;

  // Budget
  const b = prog.budget_used ?? 0;
  $('f-budget').value = b;
  $('f-budget-val').textContent = b + '%';

  // Metrics
  $('f-today').value = prog.metrics?.today ?? 0;
  $('f-total').value = prog.metrics?.total ?? 0;

  // KPIs
  const kpis = prog.kpis ?? {};
  kpiKeys[id] = Object.keys(kpis);
  const grid  = $('kpi-grid');
  grid.innerHTML = kpiKeys[id].length === 0
    ? '<div style="color:var(--muted);font-size:13px">No KPIs recorded for this program.</div>'
    : kpiKeys[id].map(k => `
        <div class="kpi-item">
          <label>${k.replace(/_/g,' ').replace(/\bpct\b/gi,'Percentage').replace(/\bytd\b/gi,'Year to Date').toUpperCase()}</label>
          <input type="text" id="kpi-${k}" value="${kpis[k] ?? ''}" oninput="autoComputeCompletion()">
        </div>`
      ).join('');

  // Trigger initial auto-compute
  autoComputeCompletion();

  // Status badge
  const colors = { 'on-track': '#6ee7b7', caution: '#fcd34d', behind: '#fca5a5' };
  $('prog-status-badge').innerHTML =
    `<span style="color:${colors[prog.status]};font-weight:700">${prog.status.toUpperCase()}</span>`;
}

// ── Auto-compute completion from KPI form values ──────────────
function autoComputeCompletion() {
  const id = $('prog-select').value;
  if (!id) return 0;

  const g    = key => parseFloat($(`kpi-${key}`)?.value) || 0;
  const safe = (a, b) => (b > 0) ? Math.min(a / b, 1) : null;
  let ratios = [];

  if (id === 'GIP' || id === 'TES') {
    const r1 = safe(g('enrolled'), g('target_enrolled'));      if (r1 !== null) ratios.push(r1);
    const r2 = safe(g('cohorts_ytd'), g('cohorts_target'));    if (r2 !== null) ratios.push(r2);
    const gr = g('graduation_rate');  if (gr > 0) ratios.push(gr / 100);
    const vp = g('vbp_progression');  if (vp > 0) ratios.push(vp / 100);
  } else if (id === 'VBP') {
    const r1 = safe(g('enrolled'), g('target_enrolled'));      if (r1 !== null) ratios.push(r1);
    const gr = g('graduation_rate');  if (gr > 0) ratios.push(gr / 100);
  } else if (id === 'PCTP') {
    const r1 = safe(g('products_tested'), g('target_products')); if (r1 !== null) ratios.push(r1);
    const r2 = safe(g('testers_engaged'), g('target_testers'));  if (r2 !== null) ratios.push(r2);
    const r3 = safe(g('cycles_ytd'), g('cycles_target'));        if (r3 !== null) ratios.push(r3);
    const fc = g('feedback_completion'); if (fc > 0) ratios.push(fc / 100);
  } else if (id === 'SAP') {
    const r1 = safe(g('startups_supported'), g('target_supported')); if (r1 !== null) ratios.push(r1);
    const r2 = safe(g('clinic_sessions'), g('target_sessions'));     if (r2 !== null) ratios.push(r2);
    const r3 = safe(g('advisors'), g('target_advisors'));            if (r3 !== null) ratios.push(r3);
    const ra = g('routing_accuracy'); if (ra > 0) ratios.push(ra / 100);
  } else if (id === 'IRP') {
    const r1 = safe(g('enrolled'), g('target_enrolled'));      if (r1 !== null) ratios.push(r1);
    const r2 = safe(g('cohorts_ytd'), g('cohorts_target'));    if (r2 !== null) ratios.push(r2);
    const gr = g('graduation_rate');  if (gr > 0) ratios.push(gr / 100);
  } else if (id === 'GMP') {
    const r1 = safe(g('portfolio_active'), g('target_portfolio')); if (r1 !== null) ratios.push(r1);
    const rc = g('reporting_compliance'); if (rc > 0) ratios.push(Math.min(rc / 100, 1));
  } else if (id === 'IDIA') {
    const r1 = safe(g('partners'), g('target_partners'));            if (r1 !== null) ratios.push(r1);
    const r2 = safe(g('startups_admitted'), g('target_admitted'));   if (r2 !== null) ratios.push(r2);
    const r3 = safe(g('pilots'), g('target_pilots'));                if (r3 !== null) ratios.push(r3);
    const r4 = safe(g('cohorts_ytd'), g('cohorts_target'));          if (r4 !== null) ratios.push(r4);
  }

  const computed = ratios.length
    ? Math.round(ratios.reduce((s, r) => s + r, 0) / ratios.length * 100)
    : 0;

  const val = $('f-completion-val');
  const bar = $('f-completion-bar');
  if (val) val.textContent = computed + '%';
  if (bar) bar.style.width = computed + '%';
  return computed;
}

async function saveProgram() {
  const id   = $('prog-select').value;
  if (!id) { toast('Select a program first', 'warn'); return; }

  const kpis = {};
  (kpiKeys[id] ?? []).forEach(k => {
    kpis[k] = $(`kpi-${k}`)?.value ?? '';
  });

  const payload = {
    id,
    status:         $('f-status').value,
    budget_used:    parseInt($('f-budget').value),
    today_count:    parseInt($('f-today').value),
    total_count:    parseInt($('f-total').value),
    completion_pct: autoComputeCompletion(),
    kpis,
  };

  try {
    const res  = await fetch(`${API}/programs.php`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.success) {
      toast(`✅ ${id} updated successfully`);
      // Refresh local copy
      const prog = programs.find(p => p.id === id);
      if (prog) {
        prog.status         = payload.status;
        prog.budget_used    = payload.budget_used;
        prog.metrics.today  = payload.today_count;
        prog.metrics.total  = payload.total_count;
        prog.metrics.completion = payload.completion_pct;
        // Sync displayed value
        autoComputeCompletion();
        prog.kpis           = kpis;
      }
    } else {
      toast(data.error ?? 'Save failed', 'err');
    }
  } catch (_) {
    toast('Network error', 'err');
  }
}

async function resetToday() {
  const id = $('prog-select').value;
  if (!id) { toast('Select a program first', 'warn'); return; }
  $('f-today').value = 0;
  await saveProgram();
}

// ── Alerts ───────────────────────────────────────────────────
async function loadAlerts() {
  try {
    const res    = await fetch(`${API}/alerts.php`);
    const alerts = await res.json();
    $('alert-count').textContent = `(${alerts.length} active)`;
    renderAlertList(alerts);
  } catch (_) {
    $('alert-list').innerHTML = '<div class="empty">Failed to load alerts.</div>';
  }
}

function renderAlertList(alerts) {
  if (!alerts.length) {
    $('alert-list').innerHTML = '<div class="empty">No active alerts.</div>';
    return;
  }
  $('alert-list').innerHTML = alerts.map(a => `
    <div class="alert-row" id="alert-row-${a.id}">
      <div class="alert-icon">${a.icon ?? '🔔'}</div>
      <div class="alert-body">
        <div class="alert-title">${esc(a.title)}</div>
        <div class="alert-desc">${esc(a.description ?? '')}</div>
        <div class="alert-meta">
          <span class="badge badge-${a.type}">${a.type}</span>
          ${a.tag ? `&nbsp;·&nbsp;${esc(a.tag)}` : ''}
          &nbsp;·&nbsp;${esc(a.time ?? '')}
          ${a.program_id ? `&nbsp;·&nbsp;<strong>${esc(a.program_id)}</strong>` : ''}
        </div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="ackOne(${a.id})">Dismiss</button>
    </div>`
  ).join('');
}

async function createAlert() {
  const title = $('a-title').value.trim();
  if (!title) { toast('Title is required', 'warn'); return; }

  const payload = {
    action:      'create',
    type:        $('a-type').value,
    program_id:  $('a-prog').value || null,
    title,
    description: $('a-desc').value.trim(),
    tag:         $('a-tag').value.trim(),
    time_label:  $('a-time').value.trim() || 'Just now',
    icon:        $('a-icon').value.trim() || '🔔',
  };

  try {
    const res  = await fetch(`${API}/alerts.php`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.success) {
      toast('✅ Alert created');
      $('a-title').value = '';
      $('a-desc').value  = '';
      $('a-tag').value   = '';
      loadAlerts();
    } else {
      toast(data.error ?? 'Create failed', 'err');
    }
  } catch (_) {
    toast('Network error', 'err');
  }
}

async function ackOne(id) {
  try {
    await fetch(`${API}/alerts.php`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'acknowledge', id }),
    });
    const row = $(`alert-row-${id}`);
    if (row) row.remove();
    toast('Alert dismissed');
    const cnt = $('alert-count');
    const n   = parseInt(cnt.textContent.match(/\d+/)?.[0] ?? '1') - 1;
    cnt.textContent = `(${Math.max(0, n)} active)`;
  } catch (_) { toast('Network error', 'err'); }
}

async function acknowledgeAll() {
  try {
    await fetch(`${API}/alerts.php`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'acknowledge_all' }),
    });
    toast('All alerts dismissed');
    loadAlerts();
  } catch (_) { toast('Network error', 'err'); }
}

// ── Activities ───────────────────────────────────────────────
async function loadActivities() {
  const progId = $('act-filter-prog').value;
  const url    = progId ? `${API}/activities.php?program_id=${progId}` : `${API}/activities.php`;
  $('act-filter-label').textContent = progId ? `— ${progId}` : '— All Programs';
  try {
    const res  = await fetch(url);
    const acts = await res.json();
    renderActivities(acts);
    populateActivityDropdowns(acts);
  } catch (_) {
    $('act-table').innerHTML = '<div class="empty">Failed to load activities.</div>';
  }
}

function populateActivityDropdowns(acts) {
  const names   = [...new Set(acts.map(a => a.name).filter(Boolean))].sort();
  const persons = [...new Set(acts.map(a => a.person).filter(p => p && p !== 'Unassigned'))].sort();

  function repopulate(selId, values, placeholder) {
    const sel = $(selId);
    const cur = sel.value;
    sel.innerHTML =
      `<option value="">${placeholder}</option>` +
      values.map(v => `<option value="${esc(v)}"${cur === v ? ' selected' : ''}>${esc(v)}</option>`).join('') +
      '<option value="__custom__">✏️ Custom…</option>';
  }

  repopulate('act-name-sel',   names,   '— Select existing name —');
  repopulate('act-person-sel', persons, '— Select person —');
}

function handleActNameSel() {
  const sel = $('act-name-sel');
  const inp = $('act-name');
  if (sel.value === '__custom__') {
    inp.style.display = 'block';
    inp.focus();
  } else {
    inp.style.display = 'none';
    inp.value = '';
  }
}

function handleActPersonSel() {
  const sel = $('act-person-sel');
  const inp = $('act-person');
  if (sel.value === '__custom__') {
    inp.style.display = 'block';
    inp.focus();
  } else {
    inp.style.display = 'none';
    inp.value = '';
  }
}

function renderActivities(acts) {
  if (!acts.length) {
    $('act-table').innerHTML = '<div class="empty">No activities found.</div>';
    return;
  }
  $('act-table').innerHTML = `
    <table>
      <thead><tr>
        <th>PROGRAM</th><th>NAME</th><th>TYPE</th>
        <th>DATE</th><th>STATUS</th><th>PERSON</th>
      </tr></thead>
      <tbody>
        ${acts.map(a => `<tr>
          <td><strong>${esc(a.progId)}</strong></td>
          <td>${esc(a.name)}</td>
          <td>${esc(a.type)}</td>
          <td>${esc(a.date ?? '')}</td>
          <td><span class="status-pill status-${a.status}">${esc(a.status)}</span></td>
          <td>${esc(a.person ?? '—')}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function logActivity() {
  const nameSel = $('act-name-sel').value;
  const name = (nameSel && nameSel !== '__custom__') ? nameSel : $('act-name').value.trim();
  if (!name) { toast('Activity name is required', 'warn'); return; }

  const personSel = $('act-person-sel').value;
  const person = (personSel && personSel !== '__custom__') ? personSel : $('act-person').value.trim();

  const payload = {
    program_id: $('act-prog').value,
    name,
    type:   $('act-type').value,
    date:   $('act-date').value,
    status: $('act-status').value,
    person: person || 'Unassigned',
    notes:  $('act-notes').value.trim(),
  };

  try {
    const res  = await fetch(`${API}/activities.php`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.success) {
      toast(`✅ Activity logged (ID ${data.id})`);
      $('act-name-sel').value   = '';
      $('act-name').value        = '';
      $('act-name').style.display = 'none';
      $('act-person-sel').value  = '';
      $('act-person').value      = '';
      $('act-person').style.display = 'none';
      $('act-notes').value  = '';
      loadActivities();
      // Refresh local program metrics so today/total counts are fresh
      try {
        const pr = await fetch(`${API}/programs.php`);
        programs = await pr.json();
        const id = $('prog-select').value;
        if (id) loadProgram();
      } catch (_) {}
    } else {
      toast(data.error ?? 'Log failed', 'err');
    }
  } catch (_) {
    toast('Network error', 'err');
  }
}

// ── Role-based view ──────────────────────────────────────────
function applyRole(role) {
  // Show/hide manager-only tabs (Program Metrics, Alerts)
  document.querySelectorAll('[data-role="manager"]').forEach(el =>
    el.classList.toggle('role-hidden', role !== 'manager')
  );
  // Show/hide field-only tabs (Program Overview)
  document.querySelectorAll('[data-role="field"]').forEach(el =>
    el.classList.toggle('role-hidden', role !== 'field')
  );
  // If the currently active tab just got hidden, switch to a visible default
  const activeTab = document.querySelector('.tab.active');
  if (activeTab?.classList.contains('role-hidden')) {
    switchTab(role === 'field' ? 'summary' : 'programs');
  }
  // Update header subtitle
  $('role-desc').textContent = role === 'field'
    ? 'View program status and log your field activities'
    : 'Update program metrics, alerts, and activities';
  // Populate summary panel when switching to Field Staff view
  if (role === 'field' && programs.length) renderSummary();
  // Persist choice for this browser session
  try { sessionStorage.setItem('adminRole', role); } catch (_) {}
}

function renderSummary() {
  const el = $('summary-grid');
  if (!el) return;
  if (!programs.length) {
    el.innerHTML = '<div class="empty">No programs loaded.</div>';
    return;
  }
  const statusIcons  = { 'on-track': '&#x2705;', caution: '&#x26A0;&#xFE0F;', behind: '&#x1F6A8;' };
  const statusLabels = { 'on-track': 'On Track', caution: 'Caution', behind: 'Behind' };
  el.innerHTML = programs.map(p => {
    const c   = p.metrics?.completion ?? 0;
    const tot = p.metrics?.total      ?? 0;
    const tod = p.metrics?.today      ?? 0;
    const bar = p.status === 'behind'  ? '#ef4444'
              : p.status === 'caution' ? '#f59e0b' : '#10b981';
    return `
      <div class="summary-prog-card">
        <div class="summary-prog-head">
          <span class="summary-prog-icon">${p.icon ?? '\u{1F4CC}'}</span>
          <div>
            <div class="summary-prog-name">${esc(p.abbr)}</div>
            <div class="summary-prog-stage">${esc(p.stage ?? p.id ?? '')}</div>
          </div>
        </div>
        <span class="summary-status ${p.status}">${statusIcons[p.status] ?? ''} ${statusLabels[p.status] ?? esc(p.status)}</span>
        <div class="summary-metrics-row">
          <div><strong>${tod}</strong>Today</div>
          <div><strong>${tot.toLocaleString()}</strong>Total</div>
          <div><strong>${c}%</strong>Done</div>
        </div>
        <div class="summary-progress">
          <div class="summary-progress-fill" style="width:${c}%;background:${bar}"></div>
        </div>
      </div>`;
  }).join('');
}

// ── Utils ─────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Auth helpers ─────────────────────────────────────────────
async function initApp() {
  try {
    const res  = await fetch(`${API}/auth.php`, { credentials: 'same-origin' });
    const data = await res.json();
    if (data.authenticated) {
      showApp(data.user);
    } else {
      $('login-overlay').classList.remove('hidden');
      $('li-user').focus();
    }
  } catch (_) {
    $('login-overlay').classList.remove('hidden');
  }
}

async function doLogin() {
  const btn  = $('li-btn');
  const user = $('li-user').value.trim();
  const pass = $('li-pass').value;
  $('login-error').textContent = '';
  if (!user || !pass) { $('login-error').textContent = 'Please enter username and password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const res  = await fetch(`${API}/auth.php`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ username: user, password: pass }),
    });
    const data = await res.json();
    if (res.ok && data.success) {
      $('li-pass').value = '';
      showApp(data.user);
    } else {
      $('login-error').textContent = 'Invalid username or password.';
    }
  } catch (_) {
    $('login-error').textContent = 'Cannot reach server. Is XAMPP running?';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function doLogout() {
  await fetch(`${API}/auth.php`, { method: 'DELETE', credentials: 'same-origin' });
  $('logout-btn').style.display = 'none';
  $('login-overlay').classList.remove('hidden');
  $('li-user').value = ''; $('li-pass').value = '';
  $('login-error').textContent = '';
  $('li-user').focus();
}

function showApp(user) {
  $('login-overlay').classList.add('hidden');
  $('logout-btn').style.display = '';
  $('role-desc').textContent = `Signed in as ${user} — update program metrics, alerts, and activities`;
  boot();
}

initApp();
</script>
